<!DOCTYPE html><html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0}
body{width:1200px;height:630px;overflow:hidden;background:#070b16;color:#e8eef7;font-family:'Inter',sans-serif;
 background-image:radial-gradient(900px 500px at 12% -10%,rgba(56,189,248,.18),transparent 60%),radial-gradient(900px 500px at 90% 110%,rgba(168,85,247,.20),transparent 62%),radial-gradient(700px 500px at 50% 50%,rgba(34,197,94,.06),transparent 70%),linear-gradient(rgba(148,163,184,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(148,163,184,.05) 1px,transparent 1px);
 background-size:auto,auto,auto,52px 52px,52px 52px;display:flex;flex-direction:column;justify-content:center;padding:0 88px}
.row{display:flex;align-items:center;gap:24px}
.wm{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:104px;color:#fff;letter-spacing:-3px;line-height:1}
.live{display:inline-flex;align-items:center;gap:10px;font-size:18px;letter-spacing:3px;color:#22c55e;font-weight:700;margin-left:14px}
.dot{width:13px;height:13px;border-radius:50%;background:#22c55e;box-shadow:0 0 16px #22c55e}
.tag{font-size:40px;font-weight:700;color:#fff;margin-top:30px;line-height:1.2;max-width:920px;letter-spacing:-.5px}
.tag b{background:linear-gradient(90deg,#38bdf8,#a855f7);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.sub{font-size:24px;color:#8a99b5;margin-top:22px}
.chips{display:flex;gap:12px;margin-top:34px}
.chip{font-size:21px;font-weight:600;color:#cdd8ec;border:1px solid rgba(148,163,184,.3);border-radius:12px;padding:9px 20px;background:rgba(148,163,184,.06)}
.foot{position:absolute;bottom:46px;left:88px;font-size:19px;color:#5d6b86}
</style></head>
<body>
  <div class="row">
    <svg width="92" height="92" viewBox="0 0 28 28" style="border-radius:18px;box-shadow:0 0 0 1px rgba(148,163,184,.25)"><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#2b4079"/><stop offset="1" stop-color="#0e1a35"/></linearGradient></defs><rect width="28" height="28" rx="7" fill="url(#g)"/><path d="M14 5.4 Q14 14 22.6 14 Q14 14 14 22.6 Q14 14 5.4 14 Q14 14 14 5.4 Z" fill="#fff"/></svg>
    <span class="wm">Jarvis</span>
    <span class="live"><span class="dot"></span>LIVE</span>
  </div>
  <div class="tag">Four <b>self-improving AI</b> trading systems</div>
  <div class="sub">Autonomous · self-grading · all public · paper-traded</div>
  <div class="chips"><span class="chip">📈 Stocks</span><span class="chip">₿ Crypto</span><span class="chip">🔬 Lab</span><span class="chip">⚡ Scalper</span></div>
  <div class="foot">adamdegoat.github.io/jarvis</div>
</body></html>
